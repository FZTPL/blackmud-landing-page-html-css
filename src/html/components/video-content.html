<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/video-content.css" />
    <title>video-content-component</title>
</head>
<body>
    <div class="video-container inter">
        <div class="video-content-text">
            <div class="video-border">
                <h2>WEBINARS</h2>
            </div>
            <h1>Building stable <span class="linebreak">financial future</span></h1>
        </div>
    
        <!-- First Card -->
        <div class="card">
            <div class="card-content mt-0">
                <div class="video-border">
                    <h5>EPS 25</h5>
                </div>
                <h3>Maximizing your <span class="linebreak"> investments: strategies </span> for growth</h3>
            </div>
            <div class="card-image mb">
                <input class="checkplay" type="radio" name="play" />
                <!-- <img src="../../image/video-content.png" alt="Video placeholder" /> -->
                <video controls muted loop playsinline poster="../../image/video-content.png">
                    <source src="../../video/mov_bbb.mp4" type="video/mp4" />
                </video>
                <div class="play-btn">
                    <img class="playy-arrow" src="../../image/play_arrow.png" alt="Play Button">
                    <img class="paused-arrow" src="../../image/paused.png" alt="Pause Button">
                </div>
            </div>
        </div>
    
        <!-- Second Card -->
        <div class="card">
            <div class="card-content transform">
                <div class="video-border">
                    <h5>EPS 24</h5>
                </div>
                <h3>Investments strategies <span class="linebreak"> for a volatile market</span></h3>
            </div>
            <div class="card-image mb">
                <input class="checkplay" type="radio" name="play" />
                <!-- <img src="../../image/video-content.png" alt="Video placeholder" /> -->
                <video controls muted loop playsinline poster="../../image/video-content.png">
                    <source src="../../video/mov_bbb.mp4" type="video/mp4" />
                </video>
                <div class="play-btn">
                    <img class="playy-arrow" src="../../image/play_arrow.png" alt="Play Button">
                    <img class="paused-arrow" src="../../image/paused.png" alt="Pause Button">
                </div>
            </div>
        </div>
    
        <!-- Third Card -->
        <div class="card">
            <div class="card-content">
                <div class="video-border">
                    <h5>EPS 23</h5>
                </div>
                <h3>Growth strategies <span class="linebreak"> for maximizing your </span> investments</h3>
            </div>
            <div class="card-image mb">
                <input class="checkplay" type="radio" name="play" />
                <!-- <img src="../../image/video-content.png" alt="Video placeholder" /> -->
                <video controls muted loop playsinline poster="../../image/video-content.png">
                    <source src="../../video/mov_bbb.mp4" type="video/mp4" />
                </video>
                <div class="play-btn">
                    <img class="playy-arrow" src="../../image/play_arrow.png" alt="Play Button">
                    <img class="paused-arrow" src="../../image/paused.png" alt="Pause Button">
                </div>
            </div>
        </div>
        <button class="video-button"><a href="#">LEARN MORE</a></button>
    </div>

</body>
</html>
