<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <title>accordion</title>
    <link rel="stylesheet" href="../../css/accordion.css">
</head>
<body>
    <div class="container inter">
        <div class="accordion-title">
            <div class="title-border"><h2>SERVICES</h2></div>
                <h1>
                    Customized financial solutions
                </h1>
      </div>
      <div class="accordion-text">
            <div class="accordion-component">
                  <div class="accordion-border"><h2>01</h2></div>
                  <div class="accordion-icon">
                      <h1 class="color-blue">
                        Financial planning
                      </h1>
                      <input type="checkbox" name="accordion" id="">
                      <div class="accordion-circle"><img src="../../image/icon.png" alt=""></div>
                    </div>
                      <p>
                          We understand that financial planning can be a complex and <span class="linebreak">daunting
                          task for many individuals and businesses. That's </span><span class="linebreak">why we're here to
                          guide you.
                      </p>
                      <button class="accordion-button"><a href="#">LEARN MORE</a></button>
            </div>
            <div class="accordion-image">
              <img src="../../image/accordion.png" alt=""/>
            </div>
      </div>
      <div class="accordion-content">
          <div class="accordion-border"><h2>02</h2></div>
        <div class="accordion-icon">
              <h1>
                Business planning
              </h1>
              <input type="checkbox" name="accordion" id="">
              <div class="accordion-circles"><img src="../../image/plus.png" alt=""></div>
            </div>
      <div class="accordion-content">
          <div class="accordion-border"><h2>03</h2></div>
        <div class="accordion-icon">
              <h1>
                Invest management
              </h1>
              <input type="checkbox" name="accordion" id="">
              <div class="accordion-circles"><img src="../../image/plus.png" alt=""></div>
        </div>
      </div>
      <div class="accordion-content padding-button">
          <div class="accordion-border"><h2>04</h2></div>
        <div class="accordion-icon">
              <h1>
                Retirement <span class="linebreaks">management</span> 
              </h1>
              <input type="checkbox" name="accordion" id="">
              <div class="accordion-circles margin-top"><img src="../../image/plus.png" alt=""></div>
        </div>
      </div>
    </div>
</body>
</html>
